name: ci
on:
  push:
    branches:
      - master
      - main
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: recursive

      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '19'

      - name: Cache Gradle and wrapper
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Build Release apk
        run: echo "" >> ./local.properties && ./gradlew lintRelease

  build_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: write
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: recursive

      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '19'

      - name: Restore keystore
        run: echo ${{ secrets.DEBUG_KEYSTORE }} | base64 -d > $HOME/debug.keystore

      - name: Cache Gradle and wrapper
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Bump version
        id: bump_version
        if: github.repository == 'agronick/aa-torque'
        uses: oflynned/android-version-bump@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: rickstaa/action-create-tag@v1
        id: "tag_create"
        with:
          tag: "latest"
          tag_exists_error: false
          force_push_tag: true
          message: "Latest release"

      - name: Build Release apk
        if: github.repository == 'agronick/aa-torque'
        run: >
          echo "" >> ./local.properties &&
          ./gradlew assembleRelease 
          -Pandroid.injected.signing.store.file=$HOME/debug.keystore 
          -Pandroid.injected.signing.key.alias=androiddebugkey 
          -Pandroid.injected.signing.store.password=android 
          -Pandroid.injected.signing.key.password=android

      - name: Build Release apk for forked repos
        if: github.repository != 'agronick/aa-torque'
        run: >
           echo "" >> ./local.properties && ./gradlew assembleRelease 

      - name: Rename release
        run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/aa-torque.apk

      - name: Publish or update latest release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          APK="app/build/outputs/apk/release/aa-torque.apk"
          MAPPING="app/build/outputs/mapping/release/mapping.txt"
          NOTES="Automated build from ${GITHUB_SHA}"

          if gh release view latest --repo "$REPO" >/dev/null 2>&1; then
            gh release upload latest "$APK" --repo "$REPO" --clobber
            gh release upload latest "$MAPPING" --repo "$REPO" --clobber
            gh release edit latest \
              --repo "$REPO" \
              --title "latest" \
              --notes "$NOTES" \
              --draft=false \
              --prerelease=false
          else
            gh release create latest "$APK" "$MAPPING" \
              --repo "$REPO" \
              --title "latest" \
              --notes "$NOTES" \
              --latest
          fi
